<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 New Grad Benchmarking Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f4f1;
    --surface: #ffffff;
    --surface2: #f1efe8;
    --border: rgba(0,0,0,0.1);
    --border2: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text2: #5f5e5a;
    --text3: #888780;
    --radius: 10px;
    --radius-lg: 14px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1a1a18;
      --surface: #242422;
      --surface2: #2c2c2a;
      --border: rgba(255,255,255,0.1);
      --border2: rgba(255,255,255,0.18);
      --text: #f1efe8;
      --text2: #b4b2a9;
      --text3: #888780;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  .header { background: var(--surface); border-bottom: 0.5px solid var(--border); padding: 18px 32px; display: flex; align-items: center; justify-content: space-between; }
  .header h1 { font-size: 17px; font-weight: 600; color: var(--text); }
  .header-sub { font-size: 13px; color: var(--text3); margin-top: 2px; }
  .updated { font-size: 12px; color: var(--text3); }
  .dash { max-width: 1100px; margin: 0 auto; padding: 24px 24px; }
  .controls { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .ctrl-label { font-size: 13px; color: var(--text2); }
  select { font-size: 13px; padding: 7px 12px; border-radius: var(--radius); border: 0.5px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; outline: none; }
  select:focus { border-color: #378ADD; box-shadow: 0 0 0 3px rgba(55,138,221,0.15); }
  .metric-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 20px; }
  @media (max-width: 700px) { .metric-grid { grid-template-columns: repeat(2,1fr); } }
  .metric { background: var(--surface2); border-radius: var(--radius); padding: 16px 18px; }
  .metric-label { font-size: 12px; color: var(--text3); margin-bottom: 5px; }
  .metric-value { font-size: 24px; font-weight: 600; color: var(--text); }
  .metric-sub { font-size: 11px; color: var(--text3); margin-top: 3px; }
  .chart-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
  @media (max-width: 700px) { .chart-row { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 18px 20px; }
  .card-title { font-size: 13px; font-weight: 500; color: var(--text2); margin-bottom: 14px; }
  .chart-wrap { position: relative; }
  .legend { display: flex; gap: 16px; margin-bottom: 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text2); }
  .legend-swatch { width: 10px; height: 10px; border-radius: 2px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; padding: 7px 10px; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
  td { padding: 8px 10px; border-bottom: 0.5px solid var(--border); color: var(--text); vertical-align: middle; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: var(--surface2); }
  .badge { display: inline-block; font-size: 11px; padding: 2px 9px; border-radius: 99px; font-weight: 600; }
  .badge-green { background: #EAF3DE; color: #3B6D11; }
  .badge-amber { background: #FAEEDA; color: #854F0B; }
  .badge-red { background: #FCEBEB; color: #A32D2D; }
  .bar-bg { background: var(--surface2); border-radius: 3px; height: 5px; margin-top: 4px; overflow: hidden; min-width: 60px; }
  .bar-fill { height: 100%; border-radius: 3px; background: #378ADD; }
  .rank { font-size: 12px; color: var(--text3); font-weight: 600; }
  .sparkline-wrap { display: flex; gap: 3px; align-items: flex-end; height: 26px; }
  .sparkbar { width: 9px; border-radius: 2px; background: #B5D4F4; flex-shrink: 0; }
  .sparkbar.active { background: #378ADD; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; }
  .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }

</style>
</head>
<body>

<div class="header">
  <div>
    <div class="header h1" style="font-size:17px;font-weight:600">2026 New Grad Benchmarking</div>
    <div class="header-sub">Revenue & consult performance tracker</div>
  </div>
  <div class="updated" id="updated-label"></div>
</div>

<div class="dash">

  <div class="controls">
    <span class="ctrl-label">Month</span>
    <select id="month-sel">
      <option value="all">All months (YTD)</option>
      <option value="0">January</option>
      <option value="1">February</option>
      <option value="2">March</option>
      <option value="3">April</option>
      <option value="4">May</option>
    </select>
    <span class="ctrl-label" style="margin-left:10px">Sort by</span>
    <select id="sort-sel">
      <option value="revenue">Revenue</option>
      <option value="consults">Consults</option>
      <option value="avg">Avg sale price</option>
    </select>
    <span class="ctrl-label" style="margin-left:10px">🔒 Spotlight</span>
    <select id="spotlight-sel">
      <option value="">Off — show all names</option>
    </select>
  </div>

  <div class="metric-grid" id="kpi-grid"></div>

  <div class="chart-row">
    <div class="card">
      <div class="card-title">Monthly revenue &amp; consults</div>
      <div class="legend">
        <span class="legend-item"><span class="legend-swatch" style="background:#378ADD"></span>Revenue</span>
        <span class="legend-item"><span class="legend-swatch" style="background:#1D9E75"></span>Consults</span>
      </div>
      <div class="chart-wrap" style="height:190px"><canvas id="trend-chart" role="img" aria-label="Monthly revenue and consults trend"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">Revenue share — top 10 practitioners</div>
      <div class="chart-wrap" style="height:210px"><canvas id="pie-chart" role="img" aria-label="Revenue share by practitioner"></canvas></div>
    </div>
  </div>

  <div class="card">
    <div class="table-header">
      <span class="section-label">Practitioner leaderboard</span>
      <span id="showing-label" style="font-size:12px;color:var(--text3)"></span>
    </div>
    <div style="overflow-x:auto">
      <table id="leaderboard">
        <thead>
          <tr>
            <th style="width:28px">#</th>
            <th>Practitioner</th>
            <th>Revenue</th>
            <th>Consults</th>
            <th>Avg $</th>
            <th>Trend (J–M)</th>
          </tr>
        </thead>
        <tbody id="lb-body"></tbody>
      </table>
    </div>
  </div>



</div>

<script>
const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const COLORS = ['#378ADD','#1D9E75','#BA7517','#D4537E','#7F77DD','#D85A30','#639922','#E24B4A','#0F6E56','#534AB7'];

// ── Base data ────────────────────────────────────────────────────────────────
const baseRevData = {
  'Adeel Siddiqui':[12447,12340,16554,12392,12566],
  'Avin Dhakal':[11309,12214,11479,8405,8803],
  'Maia Sousa':[7071,10003,12979,16001,16683],
  'Georgia Heath':[3913,13158,15406,12880,6778],
  'Molly Manahan':[4018,9445,13564,13111,13743],
  'Nay Lin':[3863,7152,11568,10863,11720],
  'Jeanette Ann Maramot':[2444,10544,10016,12583,16104],
  'James Reginato':[1197,9076,11943,9668,12270],
  'Isabelle Walsh':[814,8524,10225,12092,14404],
  'Tobi Geri':[0,15488,17351,16780,19992],
  'Sophie Roach':[0,9343,19697,15062,13470],
  'Oliver Vandenberg':[0,6789,17109,9939,10999],
  'Levitta Panuncillo':[65,3827,12433,13044,14013],
  'Dorcas Chow':[0,2690,14966,19073,15875],
  'Brodie Martin':[1276,6846,9059,8854,8641],
  'Teagan Rodda':[0,3861,11500,11685,14331],
  'Winna Wijaya':[0,5588,15576,12496,12636],
  'Martha Kilian':[0,5276,9109,8391,13915],
  'Meagan Pohlmann':[0,4159,12541,10050,6462],
  'Jack Campbell':[0,4787,7910,8056,7456],
  'Katelyn Cairns':[0,870,5226,5815,10445],
  'Sophie Strickland':[0,3950,4508,7829,0],
  'Carina Hagarty':[0,3847,2687,4195,3422],
  'Reily Allan':[0,1112,4155,1860,3886],
  'Madison Stanley':[0,2208,6325,4886,6269],
  'Gerard Murphy':[0,1510,3663,4407,6667],
  'Chung Tai SZE-TO':[0,0,4738,3723,5826],
  'Harrison Kennedy':[0,0,501,5730,6619],
  'Yu Fung Ng':[0,0,0,9892,16441],
};
const baseConsultData = {
  'Adeel Siddiqui':[126,120,159,117,120],
  'Avin Dhakal':[53,52,52,40,38],
  'Maia Sousa':[63,88,122,148,146],
  'Georgia Heath':[38,106,124,107,50],
  'Molly Manahan':[31,67,99,94,91],
  'Nay Lin':[37,67,99,99,107],
  'Jeanette Ann Maramot':[14,63,52,67,88],
  'James Reginato':[9,71,96,74,101],
  'Isabelle Walsh':[6,75,85,101,106],
  'Tobi Geri':[0,87,97,101,130],
  'Sophie Roach':[0,72,140,98,97],
  'Oliver Vandenberg':[0,55,128,74,86],
  'Levitta Panuncillo':[1,28,106,115,117],
  'Dorcas Chow':[0,25,123,157,127],
  'Brodie Martin':[11,71,97,94,95],
  'Teagan Rodda':[0,32,96,98,106],
  'Winna Wijaya':[0,30,88,66,69],
  'Martha Kilian':[0,68,116,97,140],
  'Meagan Pohlmann':[0,20,54,49,34],
  'Jack Campbell':[0,41,71,74,68],
  'Katelyn Cairns':[0,4,23,22,51],
  'Sophie Strickland':[0,18,21,27,0],
  'Carina Hagarty':[0,34,27,33,29],
  'Reily Allan':[0,10,36,20,34],
  'Madison Stanley':[0,18,59,44,53],
  'Gerard Murphy':[0,12,30,37,52],
  'Chung Tai SZE-TO':[0,0,38,29,47],
  'Harrison Kennedy':[0,0,4,65,89],
  'Yu Fung Ng':[0,0,0,90,157],
};
// Base data covers Jan–May (indices 0–4)
const BASE_MONTH_COUNT = 5;

// ── Live data (starts as copy of base, extended by uploads) ──────────────────
let revData = JSON.parse(JSON.stringify(baseRevData));
let consultData = JSON.parse(JSON.stringify(baseConsultData));
let MONTHS = ['Jan','Feb','Mar','Apr','May']; // extended as uploads arrive

function rebuildPractitioners() {
  const allNames = new Set([...Object.keys(revData), ...Object.keys(consultData)]);
  return [...allNames];
}

// ── Spotlight dropdown ────────────────────────────────────────────────────────
function rebuildSpotlightDropdown() {
  const sel = document.getElementById('spotlight-sel');
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  [...rebuildPractitioners()].sort().forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
  if (current) sel.value = current;
}

// ── Month dropdown ────────────────────────────────────────────────────────────
function rebuildMonthDropdown() {
  const sel = document.getElementById('month-sel');
  const current = sel.value;
  while (sel.options.length > 1) sel.remove(1);
  MONTHS.forEach((m, i) => {
    const opt = document.createElement('option');
    opt.value = i; opt.textContent = MONTH_NAMES[i] || m;
    sel.appendChild(opt);
  });
  // restore selection if still valid
  if (current !== 'all' && parseInt(current) < MONTHS.length) sel.value = current;
  else sel.value = 'all';
}


// ── Helpers ──────────────────────────────────────────────────────────────────
document.getElementById('updated-label').textContent = 'Last updated: ' + new Date().toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'});

function getVal(data, name, monthIdx) {
  if (!data[name]) return 0;
  if (monthIdx === 'all') return data[name].reduce((a,b)=>a+b,0);
  return data[name][monthIdx] || 0;
}

function getAvgSale(name, monthIdx) {
  const r = getVal(revData, name, monthIdx);
  const c = getVal(consultData, name, monthIdx);
  return c > 0 ? Math.round(r/c) : 0;
}

function displayName(name, spotlightName, anonIndex) {
  if (!spotlightName || name === spotlightName) return name;
  return 'Practitioner ' + anonIndex;
}

function sparkline(name, activeIdx) {
  const vals = (revData[name] || new Array(MONTHS.length).fill(0));
  const mx = Math.max(...vals, 1);
  return `<div class="sparkline-wrap">${vals.map((v,i)=>{
    const h = Math.max(3,Math.round((v/mx)*24));
    return `<div class="sparkbar${(activeIdx==='all'||i===activeIdx)?' active':''}" style="height:${h}px"></div>`;
  }).join('')}</div>`;
}

// ── Charts ────────────────────────────────────────────────────────────────────
let trendChart, pieChart;

function buildTrendChart() {
  const PRACTITIONERS = rebuildPractitioners();
  const rev = MONTHS.map((_,i) => PRACTITIONERS.reduce((s,p)=>(revData[p]?s+revData[p][i]:s),0));
  const con = MONTHS.map((_,i) => PRACTITIONERS.reduce((s,p)=>(consultData[p]?s+consultData[p][i]:s),0));
  const ctx = document.getElementById('trend-chart').getContext('2d');
  if (trendChart) trendChart.destroy();
  trendChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: MONTHS,
      datasets: [
        { label: 'Revenue ($)', data: rev, backgroundColor: '#378ADD', yAxisID: 'y', borderRadius: 4 },
        { label: 'Consults', data: con, backgroundColor: '#1D9E75', yAxisID: 'y2', borderRadius: 4 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { position:'left', ticks:{ callback: v=>'$'+Math.round(v/1000)+'k', font:{size:11} }, grid:{color:'rgba(0,0,0,0.05)'} },
        y2: { position:'right', ticks:{ font:{size:11} }, grid:{ drawOnChartArea:false } },
        x: { ticks:{ font:{size:12} }, grid:{ display:false } }
      }
    }
  });
}

function buildPieChart(monthIdx) {
  const PRACTITIONERS = rebuildPractitioners();
  const sorted = [...PRACTITIONERS].sort((a,b)=>getVal(revData,b,monthIdx)-getVal(revData,a,monthIdx)).slice(0,10);
  const ctx = document.getElementById('pie-chart').getContext('2d');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: sorted.map(p=>p.split(' ')[0]),
      datasets: [{ data: sorted.map(p=>getVal(revData,p,monthIdx)), backgroundColor: COLORS, borderWidth: 2, borderColor: '#fff' }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend:{ position:'right', labels:{ font:{size:11}, boxWidth:11, padding:9 } } },
      cutout: '58%'
    }
  });
}

// ── KPIs ──────────────────────────────────────────────────────────────────────
function buildKPIs(monthIdx) {
  const PRACTITIONERS = rebuildPractitioners();
  const totalRev = PRACTITIONERS.reduce((s,p)=>s+getVal(revData,p,monthIdx),0);
  const totalCon = PRACTITIONERS.reduce((s,p)=>s+getVal(consultData,p,monthIdx),0);
  const avgSale = totalCon>0?Math.round(totalRev/totalCon):0;
  const active = PRACTITIONERS.filter(p=>getVal(revData,p,monthIdx)>0).length;
  const monthLabel = monthIdx==='all' ? `${MONTHS[0]}–${MONTHS[MONTHS.length-1]} YTD` : (MONTH_NAMES[monthIdx]||MONTHS[monthIdx]);
  document.getElementById('kpi-grid').innerHTML = `
    <div class="metric"><div class="metric-label">Total revenue</div><div class="metric-value">$${totalRev.toLocaleString()}</div><div class="metric-sub">${monthLabel}</div></div>
    <div class="metric"><div class="metric-label">Completed consults</div><div class="metric-value">${totalCon.toLocaleString()}</div><div class="metric-sub">${monthLabel}</div></div>
    <div class="metric"><div class="metric-label">Avg sale price</div><div class="metric-value">$${avgSale}</div><div class="metric-sub">per consult</div></div>
    <div class="metric"><div class="metric-label">Active grads</div><div class="metric-value">${active}</div><div class="metric-sub">of ${PRACTITIONERS.length} total</div></div>
  `;
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function buildLeaderboard(monthIdx, sortKey, spotlightName) {
  const PRACTITIONERS = rebuildPractitioners();
  const rows = [...PRACTITIONERS].map(p=>({
    name:p, rev:getVal(revData,p,monthIdx), con:getVal(consultData,p,monthIdx),
    avg:getAvgSale(p,monthIdx),
  })).filter(p=>p.rev>0||p.con>0).sort((a,b)=>{
    if(sortKey==='revenue') return b.rev-a.rev;
    if(sortKey==='consults') return b.con-a.con;
    if(sortKey==='avg') return b.avg-a.avg;
    return b.rev-a.rev;
  });
  const maxRev = rows[0]?.rev||1;
  let anonCounter = 1;
  const anonMap = {};
  rows.forEach(p => { if (p.name !== spotlightName) anonMap[p.name] = anonCounter++; });
  document.getElementById('showing-label').textContent = `${rows.length} practitioners`;
  document.getElementById('lb-body').innerHTML = rows.map((p,i)=>{
    const label = displayName(p.name, spotlightName, anonMap[p.name]);
    const isSpotlight = spotlightName && p.name === spotlightName;
    return `
    <tr${isSpotlight ? ' style="background:rgba(55,138,221,0.07)"' : ''}>
      <td class="rank">${i+1}</td>
      <td style="font-weight:500">${label}${isSpotlight ? ' <span style="font-size:10px;color:#378ADD;font-weight:600">YOU</span>' : ''}</td>
      <td>
        <div>$${p.rev.toLocaleString()}</div>
        <div class="bar-bg"><div class="bar-fill" style="width:${Math.round((p.rev/maxRev)*100)}%"></div></div>
      </td>
      <td>${p.con}</td>
      <td>$${p.avg}</td>
      <td>${sparkline(p.name, monthIdx)}</td>
    </tr>`;
  }).join('');
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const monthIdx = document.getElementById('month-sel').value==='all'?'all':parseInt(document.getElementById('month-sel').value);
  const sortKey = document.getElementById('sort-sel').value;
  const spotlightName = document.getElementById('spotlight-sel').value;
  buildKPIs(monthIdx);
  buildPieChart(monthIdx);
  buildLeaderboard(monthIdx, sortKey, spotlightName);
}

document.getElementById('month-sel').addEventListener('change', render);
document.getElementById('sort-sel').addEventListener('change', render);
document.getElementById('spotlight-sel').addEventListener('change', render);

// ── Init ──────────────────────────────────────────────────────────────────────
rebuildMonthDropdown();
rebuildSpotlightDropdown();
buildTrendChart();
render();

</script>

</body>
</html>
